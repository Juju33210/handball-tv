<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HandTV — Programme Handball</title>
  <meta name="description" content="Tous les matchs de handball diffusés à la TV, en un coup d'œil." />
  <meta name="theme-color" content="#f8f7f4" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Familjen+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:         #f8f7f4;
      --bg2:        #ffffff;
      --surface:    #ffffff;
      --border:     #e8e6e1;
      --border2:    #d4d0c8;
      --text:       #1c1917;
      --text-dim:   #6b6760;
      --text-faint: #a8a49e;
      --accent:     #dc2626;
      --accent2:    #ea580c;
      --live:       #16a34a;
      --live-bg:    #f0fdf4;
      --live-border:#bbf7d0;
      --upcoming:   #1d4ed8;
      --upcoming-bg:#eff6ff;
      --shadow-sm:  0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow:     0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg:  0 8px 32px rgba(0,0,0,0.12);
      --radius:     12px;
      --radius-sm:  7px;
      --font-head:  'Familjen Grotesk', sans-serif;
      --font-body:  'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; font-size: 15px; }
    img { display: block; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(248,247,244,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
    }
    .header-inner {
      max-width: 820px; margin: 0 auto;
      display: flex; align-items: center; gap: 10px; height: 56px;
    }
    .logo {
      display: flex; align-items: center; gap: 7px;
      font-family: var(--font-head); font-size: 1.35rem; font-weight: 700;
      letter-spacing: -0.03em; flex-shrink: 0; color: var(--text);
    }
    .logo-icon {
      width: 28px; height: 28px; background: var(--accent);
      border-radius: 6px; display: flex; align-items: center;
      justify-content: center; font-size: 0.9rem;
    }
    .logo em { color: var(--accent); font-style: normal; }

    .filters {
      display: flex; gap: 4px; overflow-x: auto;
      scrollbar-width: none; flex: 1; align-items: center;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border); color: var(--text-dim);
      font-family: var(--font-head); font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.02em; transition: all 0.12s; white-space: nowrap;
      background: var(--bg2);
    }
    .filter-btn:hover { border-color: var(--border2); color: var(--text); }
    .filter-btn.active { background: var(--text); border-color: var(--text); color: #fff; }
    .filter-btn.active.tv-only { background: var(--accent2); border-color: var(--accent2); }

    .refresh-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1px solid var(--border); color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
      background: var(--bg2); transition: all 0.12s; flex-shrink: 0;
    }
    .refresh-btn:hover { border-color: var(--border2); color: var(--text); }
    .refresh-btn.spinning svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MAIN ── */
    main { max-width: 820px; margin: 0 auto; padding: 20px 14px 88px; }

    /* ── STATUS BAR ── */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 6px;
    }
    .status-counts { display: flex; gap: 8px; flex-wrap: wrap; }
    .count-pill {
      display: flex; align-items: center; gap: 4px;
      font-family: var(--font-head); font-size: 0.7rem; font-weight: 600;
      letter-spacing: 0.04em; padding: 3px 8px; border-radius: 20px;
    }
    .count-pill .dot { width: 5px; height: 5px; border-radius: 50%; }
    .count-pill.live-pill { background: var(--live-bg); color: var(--live); border: 1px solid var(--live-border); }
    .count-pill.live-pill .dot { background: var(--live); }
    .count-pill.upcoming-pill { background: var(--upcoming-bg); color: var(--upcoming); border: 1px solid #bfdbfe; }
    .count-pill.upcoming-pill .dot { background: var(--upcoming); }
    .count-pill.tv-pill { background: #fff7ed; color: var(--accent2); border: 1px solid #fed7aa; }
    .count-pill.tv-pill .dot { background: var(--accent2); }
    .last-update { font-size: 0.68rem; color: var(--text-faint); font-family: var(--font-head); }

    /* ── SECTION HEADERS ── */
    .section-header { display: flex; align-items: center; gap: 8px; margin: 22px 0 8px; }
    .section-title {
      font-family: var(--font-head); font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); white-space: nowrap;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }
    .section-header.live-section .section-title { color: var(--live); }
    .section-header.upcoming-section .section-title { color: var(--upcoming); }

    /* ── MATCH CARD ── */
    .match-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 13px 15px; margin-bottom: 7px;
      display: grid; grid-template-columns: 1fr auto 1fr;
      position: relative; overflow: hidden;
      transition: box-shadow 0.15s, transform 0.1s;
      box-shadow: var(--shadow-sm);
    }
    .match-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); }
    .match-card.is-live { border-color: var(--live-border); background: linear-gradient(135deg, var(--live-bg) 0%, #fff 60%); }
    .match-card.is-live::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--live); }
    .match-card.is-finished { opacity: 0.65; }
    .match-card.is-star::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }

    .card-top { grid-column: 1/-1; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .comp-badge {
      display: flex; align-items: center; gap: 4px;
      font-family: var(--font-head); font-size: 0.67rem; font-weight: 600;
      letter-spacing: 0.04em; color: var(--text-faint);
    }
    .comp-round { color: var(--text-faint); opacity: 0.65; }
    .card-right-meta { display: flex; align-items: center; gap: 5px; }

    .live-badge {
      display: flex; align-items: center; gap: 3px;
      background: var(--live-bg); border: 1px solid var(--live-border);
      border-radius: 4px; padding: 2px 6px;
      font-family: var(--font-head); font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.06em; color: var(--live);
    }
    .live-badge::before {
      content: ''; width: 4px; height: 4px; border-radius: 50%;
      background: var(--live); animation: blink 1.1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
    .star-badge { font-size: 0.58rem; font-family: var(--font-head); font-weight: 700; color: var(--accent2); }

    /* Teams */
    .team-home { display: flex; align-items: center; gap: 9px; }
    .team-away { display: flex; align-items: center; gap: 9px; flex-direction: row-reverse; }
    .team-logo { width: 40px; height: 40px; object-fit: contain; flex-shrink: 0; }
    .team-logo-placeholder {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      background: var(--bg); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head); font-size: 0.62rem; font-weight: 700; color: var(--text-faint);
    }
    .team-name { font-family: var(--font-head); font-size: 1rem; font-weight: 600; line-height: 1.15; color: var(--text); }
    .team-away .team-name { text-align: right; }
    .is-finished .team-name { color: var(--text-dim); }

    /* Center */
    .match-center { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 12px; min-width: 84px; }
    .score-display { font-family: var(--font-head); font-size: 1.55rem; font-weight: 700; letter-spacing: -0.03em; color: var(--text); line-height: 1; }
    .score-sep { color: var(--text-faint); margin: 0 2px; font-weight: 400; }
    .is-live .score-display { color: var(--live); }
    .is-finished .score-display { color: var(--text-dim); }
    .match-time { font-family: var(--font-head); font-size: 1.3rem; font-weight: 700; color: var(--upcoming); letter-spacing: -0.02em; }
    .match-date-label { font-size: 0.64rem; color: var(--text-faint); font-family: var(--font-head); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1px; }
    .game-time-label { font-size: 0.64rem; font-family: var(--font-head); font-weight: 700; color: var(--live); margin-top: 2px; }

    /* TV row */
    .tv-channel {
      grid-column: 1/-1; display: flex; align-items: center; justify-content: space-between;
      margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--border);
    }
    .tv-channels-group { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .tv-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 4px;
      font-family: var(--font-head); font-size: 0.67rem; font-weight: 700;
      letter-spacing: 0.03em; border: 1px solid;
    }
    .tv-chip.bein   { color: #92400e; border-color: #fde68a; background: #fffbeb; }
    .tv-chip.htv    { color: #991b1b; border-color: #fecaca; background: #fef2f2; }
    .tv-chip.free   { color: #1e40af; border-color: #bfdbfe; background: #eff6ff; }
    .tv-chip.other  { color: var(--text-dim); border-color: var(--border); background: var(--bg); }
    .no-tv { font-size: 0.65rem; color: var(--text-faint); font-style: italic; font-family: var(--font-head); }

    .notif-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 5px;
      font-family: var(--font-head); font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.03em; border: 1px solid var(--border);
      color: var(--text-dim); background: var(--bg2); transition: all 0.12s;
    }
    .notif-btn:hover { border-color: var(--upcoming); color: var(--upcoming); background: var(--upcoming-bg); }
    .notif-btn.active { border-color: var(--upcoming); color: var(--upcoming); background: var(--upcoming-bg); }

    /* ── STANDINGS ── */
    .standings-tabs { display: flex; gap: 5px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; }
    .standings-tabs::-webkit-scrollbar { display: none; }
    .standings-tab {
      padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
      font-family: var(--font-head); font-size: 0.72rem; font-weight: 600;
      color: var(--text-dim); background: var(--bg2); white-space: nowrap; cursor: pointer; transition: all 0.12s;
    }
    .standings-tab:hover { border-color: var(--border2); color: var(--text); }
    .standings-tab.active { background: var(--text); border-color: var(--text); color: #fff; }
    .standings-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
    .standings-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .standings-league-name { font-family: var(--font-head); font-size: 0.8rem; font-weight: 700; color: var(--text); }
    .standings-updated { font-size: 0.65rem; color: var(--text-faint); font-family: var(--font-head); }
    .standings-table { width: 100%; border-collapse: collapse; font-family: var(--font-head); }
    .standings-table th { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); padding: 6px 8px; text-align: center; border-bottom: 1px solid var(--border); }
    .standings-table th:nth-child(2) { text-align: left; }
    .standings-table td { padding: 8px; text-align: center; border-bottom: 1px solid var(--border); font-size: 0.82rem; font-weight: 500; color: var(--text); }
    .standings-table td:nth-child(2) { text-align: left; }
    .standings-table tr:last-child td { border-bottom: none; }
    .standings-table tr:hover td { background: var(--bg); }
    .standings-rank { font-size: 0.7rem; color: var(--text-faint); font-weight: 700; width: 18px; display: inline-block; text-align: center; }
    .standings-rank.top { color: #fff; background: var(--accent); border-radius: 3px; padding: 1px 3px; }
    .standings-team { display: flex; align-items: center; gap: 7px; }
    .standings-logo { width: 22px; height: 22px; object-fit: contain; }
    .standings-logo-ph { width: 22px; height: 22px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.52rem; font-weight: 700; color: var(--text-faint); }
    .standings-pts { color: var(--accent); font-weight: 700; font-size: 0.88rem; }

    /* ── NOTIF LIST ── */
    .notif-list { display: flex; flex-direction: column; gap: 7px; }
    .notif-item {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 11px 13px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow-sm);
    }
    .notif-item-info { font-family: var(--font-head); }
    .notif-item-match { font-size: 0.9rem; font-weight: 600; color: var(--text); }
    .notif-item-meta { font-size: 0.67rem; color: var(--text-dim); margin-top: 2px; }
    .notif-remove { color: var(--text-faint); font-size: 0.9rem; padding: 4px 7px; border-radius: 4px; transition: color 0.12s; }
    .notif-remove:hover { color: var(--accent); }

    /* ── NOTIF PANEL ── */
    .notif-panel {
      position: fixed; bottom: 74px; right: 14px; left: 14px; max-width: 380px; margin: 0 auto;
      background: var(--bg2); border: 1px solid #bfdbfe; border-radius: var(--radius); padding: 15px;
      z-index: 200; box-shadow: var(--shadow-lg);
      transform: translateY(16px); opacity: 0;
      transition: all 0.22s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none;
    }
    .notif-panel.show { transform: translateY(0); opacity: 1; pointer-events: all; }
    .notif-panel h3 { font-family: var(--font-head); font-size: 0.95rem; font-weight: 700; margin-bottom: 5px; color: var(--upcoming); }
    .notif-panel p { font-size: 0.77rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 11px; }
    .notif-panel-btns { display: flex; gap: 7px; }
    .btn-primary { flex: 1; padding: 7px 14px; background: var(--upcoming); color: #fff; border-radius: 6px; font-family: var(--font-head); font-size: 0.8rem; font-weight: 700; transition: opacity 0.12s; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary { padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); font-family: var(--font-head); font-size: 0.8rem; font-weight: 600; }

    /* ── EMPTY / LOADING ── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-faint); }
    .empty-state .empty-icon { font-size: 2.8rem; margin-bottom: 10px; }
    .empty-state h2 { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 5px; color: var(--text-dim); }
    .empty-state p { font-size: 0.8rem; }
    .loading-grid { display: flex; flex-direction: column; gap: 7px; }
    .skeleton { background: var(--bg2); border-radius: var(--radius); height: 104px; border: 1px solid var(--border); animation: shimmer 1.3s infinite; }
    @keyframes shimmer { 0%,100%{opacity:0.55} 50%{opacity:1} }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(248,247,244,0.95); backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around;
      padding: 7px 0 max(7px, env(safe-area-inset-bottom)); z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 3px 22px; color: var(--text-faint);
      font-family: var(--font-head); font-size: 0.58rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.12s;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 19px; height: 19px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 84px; left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: var(--text); color: #fff; border-radius: 7px;
      padding: 8px 16px; font-family: var(--font-head); font-size: 0.8rem; font-weight: 600;
      white-space: nowrap; box-shadow: var(--shadow-lg);
      opacity: 0; transition: all 0.18s; z-index: 300; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .team-name { font-size: 0.88rem; }
      .score-display { font-size: 1.35rem; }
      .match-center { padding: 0 8px; min-width: 72px; }
      .team-logo, .team-logo-placeholder { width: 34px; height: 34px; }
      .filters { display: flex; }
      .filter-btn { font-size: 0.67rem; padding: 3px 8px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo"><div class="logo-icon">🤾</div>Hand<em>TV</em></div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">Tous</button>
      <button class="filter-btn tv-only" data-filter="tv">📺 TV</button>
      <button class="filter-btn" data-filter="live">🔴 Direct</button>
      <button class="filter-btn" data-filter="starligue">Starligue</button>
      <button class="filter-btn" data-filter="proligue">ProLigue</button>
      <button class="filter-btn" data-filter="champions">Champions</button>
      <button class="filter-btn" data-filter="european">Eur. League</button>
    </div>
    <button class="refresh-btn" id="refreshBtn" title="Actualiser">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
    </button>
  </div>
</header>

<main>
  <div class="page active" id="page-matches">
    <div class="status-bar">
      <div class="status-counts" id="statusCounts"></div>
      <div class="last-update" id="lastUpdate">Chargement…</div>
    </div>
    <div id="matchesContainer"></div>
  </div>

  <div class="page" id="page-standings">
    <div class="standings-tabs" id="standingsTabs">
      <button class="standings-tab active" data-league="starligue">Starligue</button>
      <button class="standings-tab" data-league="proligue">ProLigue</button>
      <button class="standings-tab" data-league="champions">Champions</button>
      <button class="standings-tab" data-league="european">Eur. League</button>
    </div>
    <div id="standingsContainer"></div>
  </div>

  <div class="page" id="page-notifs">
    <div class="section-header" style="margin-top:0">
      <span class="section-title">Alertes configurées</span>
      <div class="section-line"></div>
    </div>
    <div id="notifList" class="notif-list"></div>
    <div id="notifEmpty" class="empty-state" style="display:none">
      <div class="empty-icon">🔔</div>
      <h2>Aucune alerte</h2>
      <p>Active les notifications depuis la fiche d'un match à venir.</p>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-item active" id="nav-matches" onclick="showPage('matches')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Programme
  </button>
  <button class="nav-item" id="nav-standings" onclick="showPage('standings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Classement
  </button>
  <button class="nav-item" id="nav-notifs" onclick="showPage('notifs')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    Alertes
  </button>
</nav>

<div class="notif-panel" id="notifPanel">
  <h3>🔔 Activer les notifications</h3>
  <p>Reçois une alerte 15 minutes avant le coup d'envoi de tes matchs favoris.</p>
  <div class="notif-panel-btns">
    <button class="btn-primary" id="notifAllow">Autoriser</button>
    <button class="btn-secondary" id="notifDismiss">Plus tard</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── SOFASCORE CONFIG ────────────────────────────────────────────
const SOFA_BASE = 'https://api.sofascore.com/api/v1';
const LEAGUES = {
  starligue: { tid: 159, sid: 77939, name: 'Liqui Moly StarLigue', short: 'Starligue', flag: '🇫🇷' },
  proligue:  { tid: 10550, sid: 78955, name: 'ProLigue', short: 'ProLigue', flag: '🇫🇷' },
  champions: { tid: 30, sid: 77630, name: 'Ligue des Champions', short: 'Champions', flag: '🏆' },
  european:  { tid: 59, sid: 78471, name: 'European League', short: 'Eur. League', flag: '🌍' },
};

// ─── STATE ───────────────────────────────────────────────────────
const state = {
  matches: [],
  filter: 'all',
  notifications: JSON.parse(localStorage.getItem('hbtv_notifs') || '[]'),
  notifPermission: Notification?.permission || 'default',
  lastUpdate: null,
  loading: true,
  tvData: [], // from lnh.fr + tvsports.fr
};

// ─── UTILS ───────────────────────────────────────────────────────
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function formatDate(ts) {
  const d = new Date(ts * 1000);
  const now = new Date();
  const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1);
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  const sameDay = (a, b) => a.toDateString() === b.toDateString();
  const days = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const months = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
  if (sameDay(d, now)) return "Aujourd'hui";
  if (sameDay(d, tomorrow)) return 'Demain';
  if (sameDay(d, yesterday)) return 'Hier';
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function formatTime(ts) {
  const d = new Date(ts * 1000);
  return `${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatTimeISO(iso) {
  if (!iso) return '--:--';
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatDateISO(iso) {
  if (!iso) return '';
  return formatDate(new Date(iso).getTime() / 1000);
}

function tvChipClass(ch) {
  const n = (ch.cssClass || ch.name || '').toLowerCase();
  if (n.includes('bein')) return 'bein';
  if (n.includes('htv') || n.includes('handball')) return 'htv';
  if (n.includes('free') || n.includes('tf1') || n.includes('m6')) return 'free';
  return 'other';
}

function sofaLogoUrl(teamId) {
  return `${SOFA_BASE}/team/${teamId}/image`;
}

// ─── SOFASCORE FETCH ─────────────────────────────────────────────
async function fetchSofaLeague(leagueKey, page = 0) {
  const lg = LEAGUES[leagueKey];
  try {
    const res = await fetch(`${SOFA_BASE}/unique-tournament/${lg.tid}/season/${lg.sid}/events/next/${page}`, {
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) return { events: [], hasNext: false };
    const data = await res.json();
    return { events: data.events || [], hasNext: !!data.hasNextPage };
  } catch (e) {
    return { events: [], hasNext: false };
  }
}

async function fetchSofaLiveToday() {
  try {
    const today = new Date().toISOString().substring(0, 10);
    const res = await fetch(`${SOFA_BASE}/sport/handball/scheduled-events/${today}`, {
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) return [];
    const data = await res.json();
    // Filter only our leagues
    const ourIds = new Set(Object.values(LEAGUES).map(l => l.tid));
    return (data.events || []).filter(e => ourIds.has(e.tournament?.uniqueTournament?.id));
  } catch (e) {
    return [];
  }
}

function sofaEventToMatch(e, leagueKey) {
  const lg = LEAGUES[leagueKey];
  const statusMap = {
    notstarted: 'upcoming', inprogress: 'live', halftime: 'live',
    finished: 'finished', afterextratime: 'finished', afterpenalties: 'finished',
    postponed: 'finished', canceled: 'finished',
  };
  const status = statusMap[e.status?.type] || 'upcoming';
  const minute = e.time?.played ? Math.floor(e.time.played / 60) : null;
  const sofaStatus = e.status?.description || null;

  return {
    id: e.id,
    leagueKey,
    competition: lg.name,
    competitionShort: lg.short,
    competitionFlag: lg.flag,
    round: e.roundInfo?.round ? `J${e.roundInfo.round}` : (e.roundInfo?.name || ''),
    timestamp: e.startTimestamp,
    datetime: e.startTimestamp ? new Date(e.startTimestamp * 1000).toISOString() : null,
    homeTeam: e.homeTeam?.name,
    awayTeam: e.awayTeam?.name,
    homeTeamId: e.homeTeam?.id,
    awayTeamId: e.awayTeam?.id,
    homeLogo: e.homeTeam?.id ? sofaLogoUrl(e.homeTeam.id) : null,
    awayLogo: e.awayTeam?.id ? sofaLogoUrl(e.awayTeam.id) : null,
    scoreHome: e.homeScore?.current ?? null,
    scoreAway: e.awayScore?.current ?? null,
    scorePeriod1Home: e.homeScore?.period1 ?? null,
    scorePeriod1Away: e.awayScore?.period1 ?? null,
    tvChannel: null,
    tvChannels: [],
    tvOnly: false,
    status,
    sofaMinute: minute,
    sofaStatus,
    isStarMatch: false,
    source: 'sofascore',
  };
}

// ─── TV ENRICHMENT ───────────────────────────────────────────────
async function fetchTVData() {
  try {
    const [lnhRes, tvRes] = await Promise.all([
      fetch('/api/matches'),
      fetch('/api/tv-program'),
    ]);
    const lnhData = lnhRes.ok ? await lnhRes.json() : { matches: [] };
    const tvData = tvRes.ok ? await tvRes.json() : { events: [] };
    return {
      lnhMatches: lnhData.matches || [],
      tvEvents: tvData.events || [],
    };
  } catch (e) {
    return { lnhMatches: [], tvEvents: [] };
  }
}

function enrichWithTV(matches, lnhMatches, tvEvents) {
  return matches.map(match => {
    // 1. Try to find in lnh.fr matches (same teams + same date)
    const matchDate = match.datetime?.substring(0, 10);
    const mHome = match.homeTeam?.toLowerCase().split(' ')[0];
    const lnhMatch = lnhMatches.find(l => {
      const lDate = l.datetime?.substring(0, 10);
      const lHome = l.homeTeam?.toLowerCase().split(' ')[0];
      return lDate === matchDate && lHome === mHome;
    });
    if (lnhMatch?.tvChannel) {
      return { ...match, tvChannel: lnhMatch.tvChannel, tvChannels: lnhMatch.tvChannels, tvOnly: true };
    }

    // 2. Try tvsports.fr events
    const matchTime = match.timestamp ? match.timestamp * 1000 : new Date(match.datetime).getTime();
    for (const event of tvEvents) {
      const eventTime = new Date(event.startDate).getTime();
      const diffMin = Math.abs(matchTime - eventTime) / 60000;
      if (diffMin > 90) continue;
      const eventName = event.name.toLowerCase();
      const homeWords = (match.homeTeam || '').toLowerCase().split(' ');
      const awayWords = (match.awayTeam || '').toLowerCase().split(' ');
      const homeMatch = homeWords.some(w => w.length > 3 && eventName.includes(w));
      const awayMatch = awayWords.some(w => w.length > 3 && eventName.includes(w));
      if (homeMatch || awayMatch) {
        const ch = {
          name: event.channel,
          short: event.channel?.replace('beIN Sports', 'beIN').replace('Eurosport', 'Euro'),
          cssClass: event.channel?.toLowerCase().includes('bein') ? 'bein' :
                    event.channel?.toLowerCase().includes('eurosport') ? 'other' :
                    event.channel?.toLowerCase().includes('handball') ? 'htv' : 'other',
          logo: event.channelLogo,
        };
        return { ...match, tvChannel: ch, tvChannels: [ch], tvOnly: true };
      }
    }
    return match;
  });
}

// ─── NOTIFICATIONS ────────────────────────────────────────────────
function saveNotifs() { localStorage.setItem('hbtv_notifs', JSON.stringify(state.notifications)); }
function isNotifSet(matchId) { return state.notifications.some(n => n.id === matchId); }

function cleanExpiredNotifs() {
  const now = Date.now();
  state.notifications = state.notifications.filter(n => {
    if (!n.datetime) return true;
    return new Date(n.datetime).getTime() + 2 * 60 * 60 * 1000 > now;
  });
  saveNotifs();
}

function checkNotifications() {
  if (state.notifPermission !== 'granted') return;
  const now = Date.now();
  state.notifications.forEach(n => {
    if (n.notified) return;
    if (!n.datetime) return;
    const matchMs = new Date(n.datetime).getTime();
    const diffMin = (matchMs - now) / 60000;
    if (diffMin <= 15 && diffMin >= -5) {
      new Notification(`🤾 ${n.homeTeam} vs ${n.awayTeam}`, {
        body: `Coup d'envoi${diffMin > 0 ? ` dans ${Math.round(diffMin)} min` : ' maintenant'}${n.tvChannel ? ` sur ${n.tvChannel}` : ''} !`,
        icon: '/favicon.ico', tag: `hbtv-${n.id}`,
      });
      n.notified = true; saveNotifs();
    }
  });
}

async function requestNotifPermission() {
  if (!('Notification' in window)) { showToast('❌ Notifications non supportées'); return false; }
  const perm = await Notification.requestPermission();
  state.notifPermission = perm; return perm === 'granted';
}

async function toggleNotif(match) {
  if (isNotifSet(match.id)) {
    const idx = state.notifications.findIndex(n => n.id === match.id);
    if (idx > -1) {
      state.notifications.splice(idx, 1); saveNotifs();
      showToast('🔕 Alerte supprimée'); renderNotifPage(); renderMatches(); return;
    }
  }
  if (state.notifPermission !== 'granted') {
    const granted = await requestNotifPermission();
    if (!granted) { showToast('❌ Permission refusée'); return; }
  }
  state.notifications.push({
    id: match.id, homeTeam: match.homeTeam, awayTeam: match.awayTeam,
    datetime: match.datetime, competition: match.competitionShort,
    tvChannel: match.tvChannel?.name || null, notified: false,
  });
  saveNotifs(); showToast('🔔 Alerte activée !'); renderNotifPage(); renderMatches();
}

// ─── RENDER ───────────────────────────────────────────────────────
function renderTeam(name, logo, teamId, side) {
  const abbr = (name || '?').substring(0, 3).toUpperCase();
  const logoHtml = logo ? `<img class="team-logo" src="${logo}" alt="${name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : '';
  const ph = `<div class="team-logo-placeholder" style="${logo ? 'display:none' : ''}">${abbr}</div>`;
  return side === 'home'
    ? `<div class="team-home">${logoHtml}${ph}<span class="team-name">${name}</span></div>`
    : `<div class="team-away"><span class="team-name">${name}</span>${logoHtml}${ph}</div>`;
}

function getGameTime(match) {
  // Use real SofaScore minute if available
  if (match.sofaStatus) {
    const s = match.sofaStatus.toLowerCase();
    if (s === 'ht' || s.includes('halftime') || s.includes('half time')) return 'Mi-temps';
    if (match.sofaMinute !== null && match.sofaMinute !== undefined) {
      if (match.sofaMinute <= 30) return `1MT ${match.sofaMinute}'`;
      return `2MT ${match.sofaMinute - 30}'`;
    }
  }
  // Fallback: approximate from start time
  if (!match.timestamp && !match.datetime) return null;
  const startMs = match.timestamp ? match.timestamp * 1000 : new Date(match.datetime).getTime();
  const elapsed = Math.floor((Date.now() - startMs) / 60000);
  if (elapsed < 0) return null;
  if (elapsed < 40) return `1MT ${elapsed}'`;
  if (elapsed < 55) return 'Mi-temps';
  if (elapsed < 95) return `2MT ${elapsed - 55}'`;
  return null;
}

function renderCenter(match) {
  const isActuallyLive = match.status === 'live' && (match.scoreHome !== null || match.scoreAway !== null);
  const isPendingLive = match.status === 'live' && match.scoreHome === null;

  if (match.status === 'finished' && match.scoreHome !== null) {
    return `<div class="match-center">
      <div class="score-display"><span>${match.scoreHome}</span><span class="score-sep">–</span><span>${match.scoreAway}</span></div>
      ${match.scorePeriod1Home !== null ? `<div class="match-date-label">(${match.scorePeriod1Home}-${match.scorePeriod1Away})</div>` : ''}
    </div>`;
  }
  if (isActuallyLive) {
    const gt = getGameTime(match);
    return `<div class="match-center">
      <div class="score-display"><span>${match.scoreHome}</span><span class="score-sep">–</span><span>${match.scoreAway}</span></div>
      ${gt ? `<div class="game-time-label">${gt}</div>` : ''}
    </div>`;
  }
  if (isPendingLive) {
    const gt = getGameTime(match);
    return `<div class="match-center">${gt ? `<div class="game-time-label" style="font-size:0.9rem">${gt}</div>` : '<div class="live-badge" style="margin:0 auto">Direct</div>'}</div>`;
  }
  // Upcoming
  const time = match.timestamp ? formatTime(match.timestamp) : formatTimeISO(match.datetime);
  const dateLabel = match.timestamp ? formatDate(match.timestamp) : formatDateISO(match.datetime);
  return `<div class="match-center">
    <div class="match-time">${time}</div>
    ${dateLabel ? `<div class="match-date-label">${dateLabel}</div>` : ''}
  </div>`;
}

function renderTVRow(match) {
  const notifSet = isNotifSet(match.id);
  const tvHtml = match.tvChannels?.length > 0
    ? `<div class="tv-channels-group">${match.tvChannels.map(ch =>
        `<span class="tv-chip ${tvChipClass(ch)}">${ch.logo ? `<img src="${ch.logo}" alt="${ch.name}" style="height:13px;width:auto;vertical-align:middle;margin-right:3px" onerror="this.style.display='none'">` : ''}${ch.short || ch.name}</span>`
      ).join('')}</div>`
    : `<span class="no-tv">Non diffusé</span>`;
  const canNotif = match.status === 'upcoming' || (match.status === 'live' && match.scoreHome === null);
  const notifHtml = canNotif
    ? `<button class="notif-btn ${notifSet ? 'active' : ''}" onclick="toggleNotif_${match.id}()">🔔 ${notifSet ? 'Alerté' : 'Alerte'}</button>`
    : '';
  return `<div class="tv-channel">${tvHtml}${notifHtml}</div>`;
}

function renderCard(match) {
  const isActuallyLive = match.status === 'live' && (match.scoreHome !== null || match.scoreAway !== null);
  const classes = ['match-card',
    isActuallyLive ? 'is-live' : '',
    match.status === 'finished' ? 'is-finished' : '',
    match.isStarMatch ? 'is-star' : '',
  ].filter(Boolean).join(' ');
  const liveBadge = isActuallyLive ? `<span class="live-badge">Direct</span>` : '';
  const starBadge = match.isStarMatch ? `<span class="star-badge">⭐ Star</span>` : '';
  return `<div class="${classes}" id="match-${match.id}">
    <div class="card-top">
      <span class="comp-badge">${match.competitionFlag} ${match.competitionShort} <span class="comp-round">${match.round}</span></span>
      <div class="card-right-meta">${starBadge}${liveBadge}</div>
    </div>
    ${renderTeam(match.homeTeam, match.homeLogo, match.homeTeamId, 'home')}
    ${renderCenter(match)}
    ${renderTeam(match.awayTeam, match.awayLogo, match.awayTeamId, 'away')}
    ${renderTVRow(match)}
  </div>`;
}

function getFilteredMatches() {
  const { matches, filter } = state;
  if (filter === 'all') return matches;
  if (filter === 'tv') return matches.filter(m => m.tvOnly);
  if (filter === 'live') return matches.filter(m => m.status === 'live');
  return matches.filter(m => m.leagueKey === filter);
}

function renderMatches() {
  const container = document.getElementById('matchesContainer');
  const filtered = getFilteredMatches();
  if (state.loading) {
    container.innerHTML = `<div class="loading-grid">${[1,2,3,4].map(() => '<div class="skeleton"></div>').join('')}</div>`;
    return;
  }
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🤾</div><h2>Aucun match</h2><p>Aucun match ne correspond à ce filtre.</p></div>`;
    return;
  }
  const live = filtered.filter(m => m.status === 'live');
  const upcoming = filtered.filter(m => m.status === 'upcoming');
  const finished = filtered.filter(m => m.status === 'finished');
  let html = '';
  if (live.length) {
    html += `<div class="section-header live-section"><span class="section-title">🔴 En direct (${live.length})</span><div class="section-line"></div></div>`;
    html += live.map(renderCard).join('');
  }
  if (upcoming.length) {
    html += `<div class="section-header upcoming-section"><span class="section-title">⏰ À venir (${upcoming.length})</span><div class="section-line"></div></div>`;
    html += upcoming.map(renderCard).join('');
  }
  if (finished.length) {
    html += `<div class="section-header"><span class="section-title">Terminés (${finished.length})</span><div class="section-line"></div>
      <button onclick="toggleFinished()" id="toggleFinishedBtn" style="flex-shrink:0;padding:3px 9px;border-radius:20px;border:1px solid var(--border);font-family:var(--font-head);font-size:0.67rem;font-weight:700;color:var(--text-dim);background:var(--bg2);cursor:pointer">Voir</button>
    </div>`;
    html += `<div id="finishedList" style="display:none">${finished.map(renderCard).join('')}</div>`;
  }
  container.innerHTML = html;
  state.matches.forEach(match => { window[`toggleNotif_${match.id}`] = () => toggleNotif(match); });
  renderStatusBar();
}

window.toggleFinished = function() {
  const list = document.getElementById('finishedList');
  const btn = document.getElementById('toggleFinishedBtn');
  if (!list) return;
  const hidden = list.style.display === 'none';
  list.style.display = hidden ? 'block' : 'none';
  btn.textContent = hidden ? 'Masquer' : 'Voir';
};

function renderStatusBar() {
  const all = state.matches;
  const liveCount = all.filter(m => m.status === 'live').length;
  const upcomingCount = all.filter(m => m.status === 'upcoming').length;
  const tvCount = all.filter(m => m.tvOnly).length;
  document.getElementById('statusCounts').innerHTML = `
    ${liveCount > 0 ? `<span class="count-pill live-pill"><span class="dot"></span>${liveCount} en direct</span>` : ''}
    <span class="count-pill upcoming-pill"><span class="dot"></span>${upcomingCount} à venir</span>
    <span class="count-pill tv-pill"><span class="dot"></span>${tvCount} diffusés TV</span>`;
  if (state.lastUpdate) {
    const d = new Date(state.lastUpdate);
    document.getElementById('lastUpdate').textContent = `Mis à jour à ${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
  }
}

// ─── STANDINGS ────────────────────────────────────────────────────
let standingsCache = {};
let currentLeague = 'starligue';

const LNH_LOGOS_STANDINGS = {
  "PSG Handball": "https://www.lnh.fr/medias/sports_teams/paris__logo__2024-2025.png",
  "HBC Nantes": "https://www.lnh.fr/medias/sports_teams/nantes__logo__2023-2024.png",
  "Montpellier Handball": "https://www.lnh.fr/medias/sports_teams/montpellier__logo__2024-2025.png",
  "Chambéry Savoie": "https://www.lnh.fr/medias/sports_teams/chambery__logo__2024-2025.png",
};

async function fetchStandings(league) {
  if (standingsCache[league]) { renderStandings(standingsCache[league], league); return; }
  document.getElementById('standingsContainer').innerHTML = `<div class="loading-grid"><div class="skeleton"></div></div>`;
  try {
    const res = await fetch(`/api/standings?league=${league}`);
    const data = await res.json();
    standingsCache[league] = data;
    renderStandings(data, league);
  } catch (err) {
    document.getElementById('standingsContainer').innerHTML = `<div class="empty-state"><div class="empty-icon">😕</div><h2>Erreur</h2><p>Impossible de charger le classement.</p></div>`;
  }
}

function renderStandings(data, league) {
  const { standings, updatedAt } = data;
  if (!standings || standings.length === 0) {
    document.getElementById('standingsContainer').innerHTML = `<div class="empty-state"><div class="empty-icon">🏐</div><h2>Aucune donnée</h2><p>Classement non disponible.</p></div>`;
    return;
  }
  const d = new Date(updatedAt);
  const timeStr = `${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
  const rows = standings.map(t => {
    const rank = t.position;
    const logo = t.team.logo ? `<img class="standings-logo" src="${t.team.logo}" alt="${t.team.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : '';
    const ph = `<div class="standings-logo-ph" style="${t.team.logo ? 'display:none' : ''}">${t.team.name.substring(0,3).toUpperCase()}</div>`;
    const diff = (t.scoredGaols || 0) - (t.receivedGoals || 0);
    return `<tr>
      <td><span class="standings-rank ${rank <= 2 ? 'top' : ''}">${rank}</span></td>
      <td><div class="standings-team">${logo}${ph}<span>${t.team.name}</span></div></td>
      <td>${t.gamesPlayed}</td><td>${t.wins}</td><td>${t.draws}</td><td>${t.loses}</td>
      <td style="color:var(--text-dim)">${diff > 0 ? '+' : ''}${diff}</td>
      <td class="standings-pts">${t.points}</td>
    </tr>`;
  }).join('');
  document.getElementById('standingsContainer').innerHTML = `
    <div class="standings-card">
      <div class="standings-header">
        <span class="standings-league-name">${data.league || ''}</span>
        <span class="standings-updated">Mis à jour à ${timeStr}</span>
      </div>
      <table class="standings-table">
        <thead><tr><th>#</th><th>Équipe</th><th>MJ</th><th>V</th><th>N</th><th>D</th><th>DB</th><th>Pts</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

document.getElementById('standingsTabs').addEventListener('click', e => {
  const btn = e.target.closest('.standings-tab'); if (!btn) return;
  document.querySelectorAll('.standings-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); currentLeague = btn.dataset.league; fetchStandings(currentLeague);
});

// ─── NOTIF PAGE ───────────────────────────────────────────────────
function renderNotifPage() {
  const list = document.getElementById('notifList');
  const empty = document.getElementById('notifEmpty');
  if (state.notifications.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = state.notifications.map(n => `
    <div class="notif-item">
      <div class="notif-item-info">
        <div class="notif-item-match">${n.homeTeam} vs ${n.awayTeam}</div>
        <div class="notif-item-meta">${n.competition} • ${formatDateISO(n.datetime)} ${formatTimeISO(n.datetime)}${n.tvChannel ? ` • 📺 ${n.tvChannel}` : ''}</div>
      </div>
      <button class="notif-remove" onclick="removeNotif(${n.id})">✕</button>
    </div>`).join('');
}

window.removeNotif = function(id) {
  const idx = state.notifications.findIndex(n => n.id === id);
  if (idx > -1) { state.notifications.splice(idx, 1); saveNotifs(); showToast('🔕 Alerte supprimée'); renderNotifPage(); renderMatches(); }
};

// ─── NAVIGATION ───────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
  if (name === 'notifs') renderNotifPage();
  if (name === 'standings') fetchStandings(currentLeague);
}
window.showPage = showPage;

// ─── MAIN FETCH ───────────────────────────────────────────────────
async function fetchAllMatches() {
  cleanExpiredNotifs();
  document.getElementById('refreshBtn').classList.add('spinning');

  try {
    // 1. Fetch all leagues from SofaScore + today's live matches in parallel
    const [
      starRes, proRes, champRes, euroRes,
      todayEvents, tvData
    ] = await Promise.all([
      fetchSofaLeague('starligue'),
      fetchSofaLeague('proligue'),
      fetchSofaLeague('champions'),
      fetchSofaLeague('european'),
      fetchSofaLiveToday(),
      fetchTVData(),
    ]);

    // 2. Convert to our match format
    const allUpcoming = [
      ...starRes.events.map(e => sofaEventToMatch(e, 'starligue')),
      ...proRes.events.map(e => sofaEventToMatch(e, 'proligue')),
      ...champRes.events.map(e => sofaEventToMatch(e, 'champions')),
      ...euroRes.events.map(e => sofaEventToMatch(e, 'european')),
    ];

    // 3. Merge today's live/finished matches
    const todayMatches = todayEvents.map(e => {
      const leagueKey = Object.keys(LEAGUES).find(k => LEAGUES[k].tid === e.tournament?.uniqueTournament?.id) || 'starligue';
      return sofaEventToMatch(e, leagueKey);
    });

    // Deduplicate: today's matches take priority over upcoming
    const upcomingIds = new Set(allUpcoming.map(m => m.id));
    const newToday = todayMatches.filter(m => !upcomingIds.has(m.id));

    // 4. Combine and sort
    const order = { live: 0, upcoming: 1, finished: 2 };
    const all = [...newToday, ...allUpcoming].sort((a, b) => {
      const sd = order[a.status] - order[b.status];
      if (sd !== 0) return sd;
      const ta = a.timestamp || new Date(a.datetime).getTime() / 1000;
      const tb = b.timestamp || new Date(b.datetime).getTime() / 1000;
      return ta - tb;
    });

    // 5. Enrich with TV channels
    const enriched = enrichWithTV(all, tvData.lnhMatches, tvData.tvEvents);

    state.matches = enriched;
    state.lastUpdate = new Date().toISOString();
    state.loading = false;
    renderMatches();

  } catch (err) {
    console.error('fetchAllMatches error:', err);
    state.loading = false;
    renderMatches();
  } finally {
    document.getElementById('refreshBtn').classList.remove('spinning');
  }
}

// ─── FILTERS ─────────────────────────────────────────────────────
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn'); if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); state.filter = btn.dataset.filter; renderMatches();
});
document.getElementById('refreshBtn').addEventListener('click', fetchAllMatches);
document.getElementById('notifAllow').addEventListener('click', async () => {
  const granted = await requestNotifPermission();
  document.getElementById('notifPanel').classList.remove('show');
  showToast(granted ? '✅ Notifications activées !' : '❌ Permission refusée');
});
document.getElementById('notifDismiss').addEventListener('click', () => {
  document.getElementById('notifPanel').classList.remove('show');
});

// ─── INIT ─────────────────────────────────────────────────────────
setInterval(fetchAllMatches, 3 * 60 * 1000);
setInterval(checkNotifications, 60 * 1000);
fetchAllMatches();
checkNotifications();
setTimeout(() => {
  if (Notification?.permission === 'default') document.getElementById('notifPanel').classList.add('show');
}, 5000);
</script>
