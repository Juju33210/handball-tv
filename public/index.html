<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HandTV — Programme Handball</title>
  <meta name="description" content="Tous les matchs de handball diffusés à la TV, en un coup d'œil." />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #f5f6fa;
      --bg2:       #ffffff;
      --surface:   #ffffff;
      --border:    #e4e6ef;
      --border2:   #d0d3e8;
      --text:      #1a1a2e;
      --text-dim:  #5a5f7a;
      --text-faint:#9a9fb8;
      --accent:    #e8193c;
      --accent2:   #ff6b00;
      --live-col:  #00b050;
      --live-bg:   #e8f8ef;
      --upcoming:  #1565c0;
      --upcoming-bg:#e8f0fc;
      --finished:  #78808a;
      --shadow:    0 2px 12px rgba(0,0,0,0.07);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
      --radius:    14px;
      --radius-sm: 8px;
      --font-cond: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }
    img { display: block; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: #fff;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
      padding: 0 16px;
    }
    .header-inner {
      max-width: 860px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px;
      height: 58px;
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-cond);
      font-size: 1.6rem; font-weight: 900;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
    }
    .logo span { color: var(--accent); }
    .filters {
      display: flex; gap: 5px; align-items: center;
      overflow-x: auto; scrollbar-width: none; flex: 1;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 5px 11px; border-radius: 20px;
      border: 1.5px solid var(--border); color: var(--text-dim);
      font-family: var(--font-cond); font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      transition: all 0.15s; white-space: nowrap; background: #fff;
    }
    .filter-btn:hover { border-color: var(--border2); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .filter-btn.active.tv-only { background: var(--accent2); border-color: var(--accent2); }
    .refresh-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1.5px solid var(--border); color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0; background: #fff;
    }
    .refresh-btn:hover { border-color: var(--border2); color: var(--text); }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    main { max-width: 860px; margin: 0 auto; padding: 20px 14px 80px; }
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; flex-wrap: wrap; gap: 6px;
    }
    .status-counts { display: flex; gap: 10px; flex-wrap: wrap; }
    .count-pill {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--font-cond); font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 3px 9px; border-radius: 20px;
    }
    .count-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
    .count-pill.live-pill { background: var(--live-bg); color: var(--live-col); }
    .count-pill.live-pill .dot { background: var(--live-col); }
    .count-pill.upcoming-pill { background: var(--upcoming-bg); color: var(--upcoming); }
    .count-pill.upcoming-pill .dot { background: var(--upcoming); }
    .count-pill.tv-pill { background: #fff4e8; color: var(--accent2); }
    .count-pill.tv-pill .dot { background: var(--accent2); }
    .last-update { font-size: 0.72rem; color: var(--text-faint); font-family: var(--font-cond); }
    .section-header { display: flex; align-items: center; gap: 10px; margin: 24px 0 10px; }
    .section-title {
      font-family: var(--font-cond); font-size: 0.72rem; font-weight: 800;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-faint); white-space: nowrap;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }
    .section-header.live-section .section-title { color: var(--live-col); }
    .section-header.upcoming-section .section-title { color: var(--upcoming); }
    .match-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px;
      display: grid; grid-template-columns: 1fr auto 1fr;
      position: relative; overflow: hidden;
      transition: box-shadow 0.15s, transform 0.1s;
    }
    .match-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .match-card.is-live { border-color: #a8e6c4; background: linear-gradient(135deg, #f0fbf5 0%, #fff 50%); }
    .match-card.is-live::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--live-col); }
    .match-card.is-finished { opacity: 0.7; }
    .match-card.is-star { border-color: #ffc999; }
    .match-card.is-star::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .card-top { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .comp-badge {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--font-cond); font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-faint);
    }
    .comp-round { opacity: 0.7; margin-left: 2px; }
    .card-right-meta { display: flex; align-items: center; gap: 6px; }
    .live-badge {
      display: flex; align-items: center; gap: 4px;
      background: var(--live-bg); border: 1px solid #a8e6c4;
      border-radius: 5px; padding: 2px 7px;
      font-family: var(--font-cond); font-size: 0.65rem; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--live-col);
    }
    .live-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--live-col); animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .star-badge { font-size: 0.6rem; font-family: var(--font-cond); font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent2); }
    .team-home { display: flex; align-items: center; gap: 10px; }
    .team-away { display: flex; align-items: center; gap: 10px; flex-direction: row-reverse; }
    .team-logo { width: 42px; height: 42px; object-fit: contain; flex-shrink: 0; }
    .team-logo-placeholder {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--bg); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-cond); font-size: 0.65rem; font-weight: 700;
      color: var(--text-faint); flex-shrink: 0;
    }
    .team-name { font-family: var(--font-cond); font-size: 1.1rem; font-weight: 700; letter-spacing: 0.01em; line-height: 1.1; color: var(--text); }
    .team-away .team-name { text-align: right; }
    .is-finished .team-name { color: var(--text-dim); }
    .match-center { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 14px; min-width: 88px; }
    .score-display { font-family: var(--font-cond); font-size: 1.6rem; font-weight: 900; letter-spacing: -0.02em; color: var(--text); line-height: 1; }
    .score-separator { color: var(--text-faint); margin: 0 2px; }
    .is-live .score-display { color: var(--live-col); }
    .is-finished .score-display { color: var(--text-dim); }
    .match-time { font-family: var(--font-cond); font-size: 1.4rem; font-weight: 800; color: var(--upcoming); letter-spacing: 0.01em; }
    .match-date-label { font-size: 0.67rem; color: var(--text-faint); font-family: var(--font-cond); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1px; }
    .tv-channel { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .tv-channels-group { display: flex; gap: 5px; align-items: center; }
    .tv-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 5px; font-family: var(--font-cond); font-size: 0.7rem; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; border: 1.5px solid; }
    .tv-chip.bein   { color: #7a5900; border-color: #ffd97a; background: #fffbee; }
    .tv-chip.htv    { color: #c0000a; border-color: #ffb3b6; background: #fff5f5; }
    .tv-chip.free   { color: #1565c0; border-color: #90caf9; background: #e8f0fc; }
    .tv-chip.other  { color: var(--text-dim); border-color: var(--border); background: var(--bg); }
    .no-tv { font-family: var(--font-cond); font-size: 0.68rem; color: var(--text-faint); font-style: italic; }
    .notif-btn {
      display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 6px;
      font-family: var(--font-cond); font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      border: 1.5px solid var(--border); color: var(--text-dim); background: #fff; transition: all 0.15s;
    }
    .notif-btn:hover { border-color: var(--upcoming); color: var(--upcoming); background: var(--upcoming-bg); }
    .notif-btn.active { border-color: var(--upcoming); color: var(--upcoming); background: var(--upcoming-bg); }
    .notif-panel {
      position: fixed; bottom: 76px; right: 14px; left: 14px; max-width: 400px; margin: 0 auto;
      background: #fff; border: 1.5px solid #90caf9; border-radius: var(--radius); padding: 16px;
      z-index: 200; box-shadow: var(--shadow-md);
      transform: translateY(20px); opacity: 0;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none;
    }
    .notif-panel.show { transform: translateY(0); opacity: 1; pointer-events: all; }
    .notif-panel h3 { font-family: var(--font-cond); font-size: 1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; color: var(--upcoming); }
    .notif-panel p { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 12px; }
    .notif-panel-btns { display: flex; gap: 8px; }
    .btn-primary { flex: 1; padding: 8px 16px; background: var(--upcoming); color: #fff; border-radius: 7px; font-family: var(--font-cond); font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; transition: opacity 0.15s; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-secondary { padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 7px; color: var(--text-dim); font-family: var(--font-cond); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
    .empty-state { text-align: center; padding: 50px 20px; color: var(--text-faint); }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 10px; }
    .empty-state h2 { font-family: var(--font-cond); font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; color: var(--text-dim); }
    .empty-state p { font-size: 0.82rem; }
    .loading-grid { display: flex; flex-direction: column; gap: 8px; }
    .skeleton { background: #fff; border-radius: var(--radius); height: 108px; border: 1.5px solid var(--border); animation: shimmer 1.4s infinite; }
    .standings-tabs { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; scrollbar-width: none; }
    .standings-tabs::-webkit-scrollbar { display: none; }
    .standings-tab { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); font-family: var(--font-cond); font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-dim); background: #fff; white-space: nowrap; cursor: pointer; transition: all 0.15s; }
    .standings-tab:hover { border-color: var(--border2); color: var(--text); }
    .standings-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .standings-table { width: 100%; border-collapse: collapse; font-family: var(--font-cond); }
    .standings-table th { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); padding: 6px 8px; text-align: center; border-bottom: 1.5px solid var(--border); }
    .standings-table th:first-child { text-align: left; padding-left: 4px; }
    .standings-table td { padding: 9px 8px; text-align: center; border-bottom: 1px solid var(--border); font-size: 0.88rem; font-weight: 600; color: var(--text); }
    .standings-table td:first-child { text-align: left; padding-left: 4px; }
    .standings-table tr:last-child td { border-bottom: none; }
    .standings-table tr:hover td { background: var(--bg); }
    .standings-rank { font-size: 0.75rem; color: var(--text-faint); font-weight: 700; width: 20px; display: inline-block; text-align: center; }
    .standings-rank.top { color: #fff; background: var(--accent); border-radius: 4px; padding: 1px 4px; }
    .standings-team { display: flex; align-items: center; gap: 8px; }
    .standings-logo { width: 24px; height: 24px; object-fit: contain; }
    .standings-logo-placeholder { width: 24px; height: 24px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 700; color: var(--text-faint); }
    .standings-points { color: var(--accent); font-weight: 800; font-size: 0.95rem; }
    .standings-card { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .standings-header { padding: 12px 16px; border-bottom: 1.5px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .standings-league-logo { width: 28px; height: 28px; object-fit: contain; }
    .standings-league-name { font-family: var(--font-cond); font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text); }
    .standings-updated { font-size: 0.68rem; color: var(--text-faint); font-family: var(--font-cond); margin-left: auto; }
    @keyframes shimmer { 0%,100%{opacity:0.6} 50%{opacity:1} }
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; background: #fff;
      border-top: 1px solid var(--border); box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
      display: flex; justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom)); z-index: 100;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 4px 24px; color: var(--text-faint); font-family: var(--font-cond); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; transition: color 0.15s; }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 20px; height: 20px; }
    .toast { position: fixed; bottom: 86px; left: 50%; transform: translateX(-50%) translateY(16px); background: var(--text); color: #fff; border-radius: 8px; padding: 9px 18px; font-family: var(--font-cond); font-size: 0.85rem; font-weight: 600; white-space: nowrap; box-shadow: var(--shadow-md); opacity: 0; transition: all 0.2s; z-index: 300; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .page { display: none; }
    .page.active { display: block; }
    .notif-list { display: flex; flex-direction: column; gap: 8px; }
    .notif-item { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); }
    .notif-item-info { font-family: var(--font-cond); }
    .notif-item-match { font-size: 0.95rem; font-weight: 700; color: var(--text); }
    .notif-item-meta { font-size: 0.7rem; color: var(--text-dim); margin-top: 2px; }
    .notif-remove { color: var(--text-faint); font-size: 1rem; padding: 4px 8px; border-radius: 4px; transition: color 0.15s; }
    .notif-remove:hover { color: var(--accent); }
    @media (max-width: 480px) {
      .team-name { font-size: 0.95rem; }
      .score-display { font-size: 1.35rem; }
      .match-center { padding: 0 8px; min-width: 72px; }
      .team-logo, .team-logo-placeholder { width: 35px; height: 35px; }
      .filters { display: flex; }
      .filter-btn { font-size: 0.7rem; padding: 4px 8px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo"><div class="logo-icon">🤾</div>Hand<span>TV</span></div>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">Tous</button>
      <button class="filter-btn tv-only" data-filter="tv">📺 TV</button>
      <button class="filter-btn" data-filter="live">🔴 Direct</button>
      <button class="filter-btn" data-filter="Liqui Moly StarLigue">Starligue</button>
      <button class="filter-btn" data-filter="ProLigue">ProLigue</button>
      <button class="filter-btn" data-filter="Ligue des Champions">Champions</button>
      <button class="filter-btn" data-filter="European League">Eur. League</button>
    </div>
    <button class="refresh-btn" id="refreshBtn" title="Actualiser">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
    </button>
  </div>
</header>

<main>
  <div class="page active" id="page-matches">
    <div class="status-bar">
      <div class="status-counts" id="statusCounts"></div>
      <div class="last-update" id="lastUpdate">Chargement…</div>
    </div>
    <div id="matchesContainer"></div>
  </div>
  <div class="page" id="page-standings">
    <div class="standings-tabs" id="standingsTabs">
      <button class="standings-tab active" data-league="starligue">Starligue</button>
      <button class="standings-tab" data-league="proligue">ProLigue</button>
      <button class="standings-tab" data-league="champions">Champions</button>
      <button class="standings-tab" data-league="european">Eur. League</button>
    </div>
    <div id="standingsContainer"></div>
  </div>
  <div class="page" id="page-notifs">
    <div class="section-header" style="margin-top:0">
      <span class="section-title">Alertes configurées</span>
      <div class="section-line"></div>
    </div>
    <div id="notifList" class="notif-list"></div>
    <div id="notifEmpty" class="empty-state" style="display:none">
      <div class="empty-icon">🔔</div>
      <h2>Aucune alerte</h2>
      <p>Active les notifications depuis la fiche d'un match à venir.</p>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-item active" id="nav-matches" onclick="showPage('matches')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
    Programme
  </button>
<button class="nav-item" id="nav-notifs" onclick="showPage('notifs')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
    Alertes
  </button>
  <button class="nav-item" id="nav-standings" onclick="showPage('standings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
    Classement
  </button>
</nav>

<div class="notif-panel" id="notifPanel">
  <h3>🔔 Activer les notifications</h3>
  <p>Reçois une alerte 15 minutes avant le coup d'envoi de tes matchs favoris.</p>
  <div class="notif-panel-btns">
    <button class="btn-primary" id="notifAllow">Autoriser</button>
    <button class="btn-secondary" id="notifDismiss">Plus tard</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const state = {
  matches: [], filter: 'all',
  notifications: JSON.parse(localStorage.getItem('hbtv_notifs') || '[]'),
  notifPermission: Notification?.permission || 'default',
  lastUpdate: null, loading: true, timers: {},
};
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}
function formatDateLabel(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr), now = new Date();
  const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1);
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
  const sameDay = (a, b) => a.getDate()===b.getDate() && a.getMonth()===b.getMonth() && a.getFullYear()===b.getFullYear();
  const days = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const months = ['jan','fév','mar','avr','mai','juin','juil','août','sep','oct','nov','déc'];
  if (sameDay(d, now)) return "Aujourd'hui";
  if (sameDay(d, tomorrow)) return 'Demain';
  if (sameDay(d, yesterday)) return 'Hier';
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}
function formatTime(isoStr) {
  if (!isoStr) return '--:--';
  const d = new Date(isoStr);
  return `${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
}
function tvChipClass(ch) {
  const n = (ch.cssClass || ch.name || '').toLowerCase();
  if (n.includes('bein')) return 'bein';
  if (n.includes('htv') || n.includes('handball')) return 'htv';
  if (n.includes('free') || n.includes('tf1') || n.includes('m6') || n.includes('france')) return 'free';
  return 'other';
}
function saveNotifs() { localStorage.setItem('hbtv_notifs', JSON.stringify(state.notifications)); }
function isNotifSet(matchId) { return state.notifications.some(n => n.id === matchId); }
async function requestNotifPermission() {
  if (!('Notification' in window)) { showToast('❌ Notifications non supportées'); return false; }
  const perm = await Notification.requestPermission();
  state.notifPermission = perm; return perm === 'granted';
}
async function toggleNotif(match) {
  if (isNotifSet(match.id)) {
    const idx = state.notifications.findIndex(n => n.id === match.id);
    if (idx > -1) {
      clearTimeout(state.timers[match.id]); delete state.timers[match.id];
      state.notifications.splice(idx, 1); saveNotifs();
      showToast('🔕 Alerte supprimée'); renderNotifPage(); renderMatches(); return;
  }
  if (state.notifPermission !== 'granted') {
    const granted = await requestNotifPermission();
    if (!granted) { showToast('❌ Permission refusée'); return; }
  }
  state.notifications.push({
    id: match.id, homeTeam: match.homeTeam, awayTeam: match.awayTeam,
    datetime: match.datetime, competition: match.competitionShort,
    tvChannel: match.tvChannel?.name || null, notified: false,
  });
  saveNotifs(); showToast('🔔 Alerte activée !'); renderNotifPage(); renderMatches();
}
  }
  if (state.notifPermission !== 'granted') {
    const granted = await requestNotifPermission();
    if (!granted) { showToast('❌ Permission refusée'); return; }
  }
  if (match.datetime) {
    const alertMs = new Date(match.datetime).getTime() - 15 * 60 * 1000;
    const delay = alertMs - Date.now();
    if (delay > 0) {
      state.timers[match.id] = setTimeout(() => {
        new Notification(`🤾 ${match.homeTeam} vs ${match.awayTeam}`, {
          body: `Coup d'envoi dans 15 min${match.tvChannel ? ` sur ${match.tvChannel.name}` : ''} !`,
          icon: match.homeLogo || '/favicon.ico', tag: `hbtv-${match.id}`,
        });
      }, delay);
    }
  }
  state.notifications.push({ id: match.id, homeTeam: match.homeTeam, awayTeam: match.awayTeam, datetime: match.datetime, competition: match.competitionShort, tvChannel: match.tvChannel?.name || null });
  saveNotifs(); showToast('🔔 Alerte activée !'); renderNotifPage(); renderMatches();
}
function renderTeam(name, logo, side) {
  const abbr = name.substring(0,3).toUpperCase();
  const logoHtml = logo ? `<img class="team-logo" src="${logo}" alt="${name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : '';
  const placeholder = `<div class="team-logo-placeholder" style="${logo?'display:none':''}">${abbr}</div>`;
  return side === 'home'
    ? `<div class="team-home">${logoHtml}${placeholder}<span class="team-name">${name}</span></div>`
    : `<div class="team-away"><span class="team-name">${name}</span>${logoHtml}${placeholder}</div>`;
}
function getGameTime(isoDatetime) {
  const elapsed = Math.floor((Date.now() - new Date(isoDatetime).getTime()) / 60000);
  if (elapsed < 40) return `1MT ${elapsed}'`;
  if (elapsed < 55) return `Mi-temps`;
  if (elapsed < 95) return `2MT ${elapsed - 55}'`;
  return null;
}

function renderCenter(match) {
  if ((match.status === 'finished' || match.status === 'live') && match.scoreHome !== null) {
    const gameTime = match.status === 'live' && match.datetime ? getGameTime(match.datetime) : null;
    const timeHtml = gameTime ? `<div class="match-date-label" style="color:var(--live-col)">${gameTime}</div>` : '';
    return `<div class="match-center"><div class="score-display"><span>${match.scoreHome}</span><span class="score-separator">–</span><span>${match.scoreAway}</span></div>${timeHtml}</div>`;
  }
  const time = formatTime(match.datetime);
  const dateLabel = formatDateLabel(match.datetime);
  return `<div class="match-center"><div class="match-time">${time}</div>${dateLabel ? `<div class="match-date-label">${dateLabel}</div>` : ''}</div>`;
}
function renderTVRow(match) {
  const notifSet = isNotifSet(match.id);
  let tvHtml = match.tvChannels && match.tvChannels.length > 0
    ? `<div class="tv-channels-group">${match.tvChannels.map(ch => `
        <span class="tv-chip ${tvChipClass(ch)}">
          ${ch.logo ? `<img src="${ch.logo}" alt="${ch.name}" style="height:14px;width:auto;vertical-align:middle;margin-right:3px;" onerror="this.style.display='none'">` : '📺'}
          ${ch.short||ch.name}
        </span>`).join('')}</div>`
    : `<span class="no-tv">Non diffusé</span>`;
  const canSetNotif = match.status === 'upcoming' || (match.status === 'live' && match.scoreHome === null && match.scoreAway === null);
  const notifHtml = canSetNotif ? `<button class="notif-btn ${notifSet?'active':''}" onclick="toggleNotif_${match.id}()">🔔 ${notifSet?'Alerté':'Alerte'}</button>` : '';
  return `<div class="tv-channel">${tvHtml}${notifHtml}</div>`;
}
function renderCard(match) {
  const isActuallyLive = match.status === 'live' && (match.scoreHome !== null || match.scoreAway !== null);
  const classes = ['match-card', isActuallyLive?'is-live':'', match.status==='finished'?'is-finished':'', match.isStarMatch?'is-star':''].filter(Boolean).join(' ');
  const liveBadge = isActuallyLive ? `<span class="live-badge">Direct</span>` : '';
  const starBadge = match.isStarMatch ? `<span class="star-badge">⭐ Star Match</span>` : '';
  return `<div class="${classes}" id="match-${match.id}">
    <div class="card-top">
      <span class="comp-badge"><span>${match.competitionFlag}</span> ${match.competitionShort} <span class="comp-round">${match.round}</span></span>
      <div class="card-right-meta">${starBadge}${liveBadge}</div>
    </div>
    ${renderTeam(match.homeTeam, match.homeLogo, 'home')}
    ${renderCenter(match)}
    ${renderTeam(match.awayTeam, match.awayLogo, 'away')}
    ${renderTVRow(match)}
  </div>`;
}
function getFilteredMatches() {
  const {matches, filter} = state;
  if (filter === 'all') return matches;
  if (filter === 'tv') return matches.filter(m => m.tvOnly);
  if (filter === 'live') return matches.filter(m => m.status === 'live');
  return matches.filter(m => m.competition === filter);
}
function renderMatches() {
  const container = document.getElementById('matchesContainer');
  const filtered = getFilteredMatches();
  if (state.loading) { container.innerHTML = `<div class="loading-grid">${[1,2,3,4].map(()=>'<div class="skeleton"></div>').join('')}</div>`; return; }
  if (filtered.length === 0) { container.innerHTML = `<div class="empty-state"><div class="empty-icon">🤾</div><h2>Aucun match</h2><p>Aucun match ne correspond à ce filtre.</p></div>`; return; }
  const live = filtered.filter(m => m.status === 'live');
  const upcoming = filtered.filter(m => m.status === 'upcoming');
  const finished = filtered.filter(m => m.status === 'finished');
  let html = '';
if (live.length) { html += `<div class="section-header live-section"><span class="section-title">🔴 En direct (${live.length})</span><div class="section-line"></div></div>`; html += live.map(renderCard).join(''); }
  if (upcoming.length) { html += `<div class="section-header upcoming-section"><span class="section-title">⏰ À venir (${upcoming.length})</span><div class="section-line"></div></div>`; html += upcoming.map(renderCard).join(''); }
  if (finished.length) {
    html += `<div class="section-header"><span class="section-title">Terminés (${finished.length})</span><div class="section-line"></div><button onclick="toggleFinished()" id="toggleFinishedBtn" style="flex-shrink:0;padding:3px 10px;border-radius:20px;border:1.5px solid var(--border);font-family:var(--font-cond);font-size:0.7rem;font-weight:700;text-transform:uppercase;color:var(--text-dim);background:#fff;cursor:pointer">Voir</button></div>`;
    html += `<div id="finishedList" style="display:none">${finished.map(renderCard).join('')}</div>`;
  }
  container.innerHTML = html;
  state.matches.forEach(match => { window[`toggleNotif_${match.id}`] = () => toggleNotif(match); });
  renderStatusBar();
}
  window.toggleFinished = function() {
  const list = document.getElementById('finishedList');
  const btn = document.getElementById('toggleFinishedBtn');
  if (!list) return;
  const isHidden = list.style.display === 'none';
  list.style.display = isHidden ? 'block' : 'none';
  btn.textContent = isHidden ? 'Masquer' : 'Voir';
};
function renderStatusBar() {
  const all = state.matches;
  const liveCount = all.filter(m => m.status === 'live').length;
  const upcomingCount = all.filter(m => m.status === 'upcoming').length;
  const tvCount = all.filter(m => m.tvOnly).length;
  document.getElementById('statusCounts').innerHTML = `
    ${liveCount > 0 ? `<span class="count-pill live-pill"><span class="dot"></span>${liveCount} en direct</span>` : ''}
    <span class="count-pill upcoming-pill"><span class="dot"></span>${upcomingCount} à venir</span>
    <span class="count-pill tv-pill"><span class="dot"></span>${tvCount} diffusés TV</span>`;
  if (state.lastUpdate) {
    const d = new Date(state.lastUpdate);
    document.getElementById('lastUpdate').textContent = `Mis à jour à ${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
  }
}
function renderNotifPage() {
  const list = document.getElementById('notifList'), empty = document.getElementById('notifEmpty');
  if (state.notifications.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = state.notifications.map(n => `<div class="notif-item"><div class="notif-item-info"><div class="notif-item-match">${n.homeTeam} vs ${n.awayTeam}</div><div class="notif-item-meta">${n.competition} • ${formatDateLabel(n.datetime)} ${formatTime(n.datetime)}${n.tvChannel ? ` • 📺 ${n.tvChannel}` : ''}</div></div><button class="notif-remove" onclick="removeNotif(${n.id})">✕</button></div>`).join('');
}
window.removeNotif = function(id) {
  const idx = state.notifications.findIndex(n => n.id === id);
  if (idx > -1) { clearTimeout(state.timers[id]); delete state.timers[id]; state.notifications.splice(idx, 1); saveNotifs(); showToast('🔕 Alerte supprimée'); renderNotifPage(); renderMatches(); }
};
  // ─── STANDINGS ────────────────────────────────────────────────────
let standingsCache = {};
let currentLeague = 'starligue';

async function fetchStandings(league) {
  if (standingsCache[league]) { renderStandings(standingsCache[league], league); return; }
  document.getElementById('standingsContainer').innerHTML = `<div class="loading-grid"><div class="skeleton"></div></div>`;
  try {
    const res = await fetch(`/api/standings?league=${league}`);
    const data = await res.json();
    standingsCache[league] = data;
    renderStandings(data, league);
  } catch (err) {
    document.getElementById('standingsContainer').innerHTML = `<div class="empty-state"><div class="empty-icon">😕</div><h2>Erreur</h2><p>Impossible de charger le classement.</p></div>`;
  }
}

function renderStandings(data, league) {
  const { standings, updatedAt } = data;
  if (!standings || standings.length === 0) {
    document.getElementById('standingsContainer').innerHTML = `<div class="empty-state"><div class="empty-icon">🏐</div><h2>Aucune donnée</h2><p>Classement non disponible pour cette compétition.</p></div>`;
    return;
  }
  const d = new Date(updatedAt);
  const timeStr = `${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
  const rows = standings.map(t => {
    const rank = t.position;
    const rankClass = rank <= 2 ? 'top' : '';
    const logo = t.team.logo
      ? `<img class="standings-logo" src="${t.team.logo}" alt="${t.team.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const placeholder = `<div class="standings-logo-placeholder" style="${t.team.logo?'display:none':''}">${t.team.name.substring(0,3).toUpperCase()}</div>`;
    const diff = (t.scoredGaols || 0) - (t.receivedGoals || 0);
    const diffStr = diff > 0 ? `+${diff}` : `${diff}`;
    return `<tr>
      <td><span class="standings-rank ${rankClass}">${rank}</span></td>
      <td><div class="standings-team">${logo}${placeholder}<span>${t.team.name}</span></div></td>
      <td>${t.gamesPlayed}</td>
      <td>${t.wins}</td>
      <td>${t.draws}</td>
      <td>${t.loses}</td>
      <td style="color:var(--text-dim)">${diffStr}</td>
      <td class="standings-points">${t.points}</td>
    </tr>`;
  }).join('');

  document.getElementById('standingsContainer').innerHTML = `
    <div class="standings-card">
      <div class="standings-header">
        <span class="standings-league-name">${data.league || ''}</span>
        <span class="standings-updated">Mis à jour à ${timeStr}</span>
      </div>
      <table class="standings-table">
        <thead><tr>
          <th>#</th><th style="text-align:left">Équipe</th>
          <th title="Matchs joués">MJ</th>
          <th title="Victoires">V</th>
          <th title="Nuls">N</th>
          <th title="Défaites">D</th>
          <th title="Différence de buts">DB</th>
          <th title="Points">Pts</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

document.getElementById('standingsTabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.standings-tab');
  if (!btn) return;
  document.querySelectorAll('.standings-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentLeague = btn.dataset.league;
  fetchStandings(currentLeague);
});

const _origShowPage = window.showPage;
window.showPage = function(name) {
  _origShowPage(name);
  if (name === 'standings') fetchStandings(currentLeague);
};
async function fetchMatches() {
  document.getElementById('refreshBtn').classList.add('spinning');
  try {
    // Fetch both sources in parallel
    const [lnhRes, fixturesRes] = await Promise.all([
      fetch('/api/matches'),
      fetch('/api/fixtures')
    ]);
    const lnhData = lnhRes.ok ? await lnhRes.json() : { matches: [] };
    const fixturesData = fixturesRes.ok ? await fixturesRes.json() : { matches: [] };

    const lnhMatches = lnhData.matches || [];
    const fixtureMatches = fixturesData.matches || [];

    // Merge: keep lnh matches + add fixtures not already in lnh
    const lnhIds = new Set(lnhMatches.map(m => `${m.homeTeam}-${m.awayTeam}-${m.datetime?.substring(0,10)}`));
    const newFixtures = fixtureMatches.filter(m => {
      const key = `${m.homeTeam}-${m.awayTeam}-${m.datetime?.substring(0,10)}`;
      return !lnhIds.has(key);
    });

    // Sort all by date
    const order = { live: 0, upcoming: 1, finished: 2 };
    const all = [...lnhMatches, ...newFixtures].sort((a, b) => {
      const sd = order[a.status] - order[b.status];
      if (sd !== 0) return sd;
      if (a.datetime && b.datetime) return new Date(a.datetime) - new Date(b.datetime);
      return 0;
    });

    state.matches = all;
    state.lastUpdate = lnhData.scrapedAt;
    state.loading = false;
    renderMatches();
  } catch (err) {
    console.error('Fetch error:', err);
    state.loading = false;
    renderMatches();
  } finally {
    document.getElementById('refreshBtn').classList.remove('spinning');
  }
}
document.getElementById('filters').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn'); if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); state.filter = btn.dataset.filter; renderMatches();
});
document.getElementById('refreshBtn').addEventListener('click', fetchMatches);
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
  if (name === 'notifs') renderNotifPage();
}
window.showPage = showPage;
document.getElementById('notifAllow').addEventListener('click', async () => {
  const granted = await requestNotifPermission();
  document.getElementById('notifPanel').classList.remove('show');
  showToast(granted ? '✅ Notifications activées !' : '❌ Permission refusée');
});
document.getElementById('notifDismiss').addEventListener('click', () => { document.getElementById('notifPanel').classList.remove('show'); });
function checkNotifications() {
  if (state.notifPermission !== 'granted') return;
  const now = Date.now();
  state.notifications.forEach(n => {
    if (n.notified) return;
    if (!n.datetime) return;
    const matchMs = new Date(n.datetime).getTime();
    const diffMin = (matchMs - now) / 60000;
    if (diffMin <= 15 && diffMin >= -5) {
      new Notification(`🤾 ${n.homeTeam} vs ${n.awayTeam}`, {
        body: `Coup d'envoi${diffMin > 0 ? ` dans ${Math.round(diffMin)} min` : ' maintenant'}${n.tvChannel ? ` sur ${n.tvChannel}` : ''} !`,
        icon: '/favicon.ico',
        tag: `hbtv-${n.id}`,
      });
      n.notified = true;
      saveNotifs();
    }
  });
}

setInterval(fetchMatches, 3 * 60 * 1000);
setInterval(checkNotifications, 60 * 1000); // Check every minute
fetchMatches();
checkNotifications();
setTimeout(() => { if (Notification?.permission === 'default') document.getElementById('notifPanel').classList.add('show'); }, 5000);
</script>
