<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HandTV — Programme Handball</title>
  <meta name="description" content="Tous les matchs de handball diffusés à la TV, en un coup d'œil." />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── VARIABLES ─── */
    :root {
      --bg:        #0a0a0f;
      --bg2:       #12121a;
      --bg3:       #1a1a26;
      --surface:   #1e1e2e;
      --border:    rgba(255,255,255,0.07);
      --text:      #e8e8f0;
      --text-dim:  #7878a0;
      --text-faint:#3a3a50;
      --accent:    #ff3d5a;
      --accent2:   #ff8c00;
      --live-col:  #00e676;
      --upcoming:  #4db6ff;
      --finished:  #5a5a7a;
      --radius:    12px;
      --radius-sm: 7px;
      --font-cond: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }

    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }
    img { display: block; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ─── NOISE TEXTURE ─── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
    }
    .header-inner {
      max-width: 900px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; gap: 16px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-cond);
      font-size: 1.7rem; font-weight: 900;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .logo span { color: var(--accent); }

    /* ─── FILTERS ─── */
    .filters {
      display: flex; gap: 6px; align-items: center;
      overflow-x: auto; scrollbar-width: none; flex: 1; justify-content: center;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-cond);
      font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      transition: all 0.15s;
      white-space: nowrap;
      background: transparent;
    }
    .filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .filter-btn.active.tv-only { background: var(--accent2); border-color: var(--accent2); }

    /* ─── REFRESH BTN ─── */
    .refresh-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .refresh-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── MAIN ─── */
    main {
      max-width: 900px; margin: 0 auto;
      padding: 24px 16px 80px;
      position: relative; z-index: 1;
    }

    /* ─── STATUS BAR ─── */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 8px;
    }
    .status-counts {
      display: flex; gap: 12px;
    }
    .count-pill {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--font-cond);
      font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-dim);
    }
    .count-pill .dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .count-pill.live-pill .dot { background: var(--live-col); box-shadow: 0 0 6px var(--live-col); }
    .count-pill.upcoming-pill .dot { background: var(--upcoming); }
    .count-pill.tv-pill .dot { background: var(--accent2); }
    .last-update {
      font-size: 0.72rem; color: var(--text-faint);
      font-family: var(--font-cond);
    }

    /* ─── SECTION HEADERS ─── */
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin: 28px 0 12px;
    }
    .section-title {
      font-family: var(--font-cond);
      font-size: 0.75rem; font-weight: 800;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-dim);
    }
    .section-line {
      flex: 1; height: 1px; background: var(--border);
    }
    .section-header.live-section .section-title { color: var(--live-col); }
    .section-header.upcoming-section .section-title { color: var(--upcoming); }

    /* ─── MATCH CARD ─── */
    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      grid-template-rows: auto auto;
      gap: 0;
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s, transform 0.1s;
      cursor: default;
    }
    .match-card:hover {
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }
    .match-card.is-live {
      border-color: rgba(0,230,118,0.3);
      background: linear-gradient(135deg, rgba(0,230,118,0.04) 0%, var(--surface) 60%);
    }
    .match-card.is-live::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--live-col);
      box-shadow: 0 0 12px var(--live-col);
    }
    .match-card.is-finished {
      opacity: 0.65;
    }
    .match-card.is-star {
      border-color: rgba(255,140,0,0.35);
    }
    .match-card.is-star::before {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    /* competition badge */
    .card-top {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .comp-badge {
      display: flex; align-items: center; gap: 5px;
      font-family: var(--font-cond);
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-dim);
    }
    .comp-badge .flag { font-size: 0.8rem; }
    .comp-round { color: var(--text-faint); margin-left: 2px; }

    .card-right-meta {
      display: flex; align-items: center; gap: 8px;
    }

    /* live badge */
    .live-badge {
      display: flex; align-items: center; gap: 4px;
      background: rgba(0,230,118,0.15);
      border: 1px solid rgba(0,230,118,0.4);
      border-radius: 4px;
      padding: 2px 7px;
      font-family: var(--font-cond);
      font-size: 0.65rem; font-weight: 800;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--live-col);
    }
    .live-badge::before {
      content: '';
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--live-col);
      animation: blink 1.2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* star badge */
    .star-badge {
      font-size: 0.6rem; font-family: var(--font-cond); font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    /* ─── TEAM ─── */
    .team-home { display: flex; align-items: center; gap: 10px; }
    .team-away { display: flex; align-items: center; gap: 10px; flex-direction: row-reverse; }

    .team-logo {
      width: 36px; height: 36px;
      object-fit: contain; flex-shrink: 0;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }
    .team-logo-placeholder {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-cond); font-size: 0.7rem;
      font-weight: 700; color: var(--text-faint);
      flex-shrink: 0;
    }
    .team-name {
      font-family: var(--font-cond);
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: 0.01em;
      line-height: 1.1;
    }
    .team-home .team-name { text-align: left; }
    .team-away .team-name { text-align: right; }
    .is-finished .team-name { color: var(--text-dim); }

    /* ─── SCORE / TIME CENTER ─── */
    .match-center {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 0 16px; min-width: 90px;
    }
    .score-display {
      font-family: var(--font-cond);
      font-size: 1.6rem; font-weight: 900;
      letter-spacing: -0.02em;
      color: #fff;
      line-height: 1;
    }
    .score-separator { color: var(--text-faint); margin: 0 3px; }
    .is-live .score-display { color: var(--live-col); }
    .is-finished .score-display { color: var(--text-dim); }

    .match-time {
      font-family: var(--font-cond);
      font-size: 1.3rem; font-weight: 700;
      color: var(--upcoming);
      letter-spacing: 0.02em;
    }
    .match-date-label {
      font-size: 0.68rem; color: var(--text-faint);
      font-family: var(--font-cond); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-top: 1px;
    }

    /* ─── TV CHANNEL ─── */
    .tv-channel {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 6px;
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
      justify-content: space-between;
    }
    .tv-channels-group { display: flex; gap: 6px; align-items: center; }
    .tv-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 5px;
      font-family: var(--font-cond); font-size: 0.72rem; font-weight: 800;
      letter-spacing: 0.05em; text-transform: uppercase;
      border: 1px solid;
    }
    .tv-chip .tv-icon { font-size: 0.8rem; }
    .tv-chip.bein { color: #f0c040; border-color: rgba(240,192,64,0.35); background: rgba(240,192,64,0.08); }
    .tv-chip.htv { color: #ff4444; border-color: rgba(255,68,68,0.35); background: rgba(255,68,68,0.08); }
    .tv-chip.free { color: #aaddff; border-color: rgba(170,220,255,0.35); background: rgba(170,220,255,0.08); }
    .tv-chip.other { color: var(--text-dim); border-color: var(--border); }

    .notif-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 5px;
      font-family: var(--font-cond); font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      border: 1px solid var(--border);
      color: var(--text-dim);
      transition: all 0.15s;
    }
    .notif-btn:hover { border-color: var(--upcoming); color: var(--upcoming); }
    .notif-btn.active { border-color: var(--upcoming); color: var(--upcoming); background: rgba(77,182,255,0.1); }
    .notif-btn.active::before { content: '✓ '; }

    /* ─── NO TV indicator ─── */
    .no-tv {
      font-family: var(--font-cond); font-size: 0.68rem;
      color: var(--text-faint);
      font-style: italic;
    }

    /* ─── NOTIFICATION PANEL ─── */
    .notif-panel {
      position: fixed; bottom: 80px; right: 16px; left: 16px;
      max-width: 400px; margin: 0 auto;
      background: var(--bg2);
      border: 1px solid rgba(77,182,255,0.3);
      border-radius: var(--radius);
      padding: 16px;
      z-index: 200;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      transform: translateY(20px); opacity: 0;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }
    .notif-panel.show {
      transform: translateY(0); opacity: 1; pointer-events: all;
    }
    .notif-panel h3 {
      font-family: var(--font-cond); font-size: 1rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
      color: var(--upcoming);
    }
    .notif-panel p { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 12px; }
    .notif-panel-btns { display: flex; gap: 8px; }
    .btn-primary {
      flex: 1; padding: 8px 16px;
      background: var(--upcoming); color: #000;
      border-radius: 6px;
      font-family: var(--font-cond); font-size: 0.85rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.06em;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      padding: 8px 16px;
      border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim);
      font-family: var(--font-cond); font-size: 0.85rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-faint);
    }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state h2 {
      font-family: var(--font-cond); font-size: 1.2rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px;
      color: var(--text-dim);
    }
    .empty-state p { font-size: 0.85rem; }

    /* ─── LOADING ─── */
    .loading-grid { display: flex; flex-direction: column; gap: 8px; }
    .skeleton {
      background: var(--surface); border-radius: var(--radius);
      height: 110px;
      animation: shimmer 1.4s infinite;
      border: 1px solid var(--border);
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* ─── BOTTOM NAV ─── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 4px 20px;
      color: var(--text-faint);
      font-family: var(--font-cond); font-size: 0.62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      transition: color 0.15s;
      position: relative;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 20px; height: 20px; }

    /* ─── TOAST ─── */
    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 18px;
      font-family: var(--font-cond); font-size: 0.85rem; font-weight: 600;
      color: var(--text); white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      opacity: 0; transition: all 0.2s;
      z-index: 300; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 480px) {
      .team-name { font-size: 0.95rem; }
      .score-display { font-size: 1.4rem; }
      .match-center { padding: 0 10px; min-width: 76px; }
      .team-logo { width: 30px; height: 30px; }
      .team-logo-placeholder { width: 30px; height: 30px; }
      .filters { display: none; }
    }

    @media (min-width: 640px) {
      .match-card { padding: 16px 20px; }
      .team-name { font-size: 1.2rem; }
    }

    /* ─── PAGE VIEWS ─── */
    .page { display: none; }
    .page.active { display: block; }

    /* ─── NOTIF LIST ─── */
    .notif-list { display: flex; flex-direction: column; gap: 8px; }
    .notif-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .notif-item-info { font-family: var(--font-cond); }
    .notif-item-match { font-size: 0.95rem; font-weight: 700; }
    .notif-item-meta { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }
    .notif-remove {
      color: var(--text-faint); font-size: 1.1rem; padding: 4px 8px;
      border-radius: 4px; transition: color 0.15s;
    }
    .notif-remove:hover { color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🤾</div>
      Hand<span>TV</span>
    </div>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">Tous</button>
      <button class="filter-btn tv-only" data-filter="tv">📺 TV</button>
      <button class="filter-btn" data-filter="live">🔴 Direct</button>
      <button class="filter-btn" data-filter="Liqui Moly StarLigue">Starligue</button>
      <button class="filter-btn" data-filter="ProLigue">ProLigue</button>
      <button class="filter-btn" data-filter="Ligue des Champions">Champions</button>
      <button class="filter-btn" data-filter="European League">Eur. League</button>
    </div>

    <button class="refresh-btn" id="refreshBtn" title="Actualiser" aria-label="Actualiser">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
    </button>
  </div>
</header>

<main>
  <!-- Page: Matches -->
  <div class="page active" id="page-matches">

    <div class="status-bar">
      <div class="status-counts" id="statusCounts"></div>
      <div class="last-update" id="lastUpdate">Chargement…</div>
    </div>

    <div id="matchesContainer"></div>
  </div>

  <!-- Page: Notifications -->
  <div class="page" id="page-notifs">
    <div class="section-header" style="margin-top:0">
      <span class="section-title">Alertes configurées</span>
      <div class="section-line"></div>
    </div>
    <div id="notifList" class="notif-list"></div>
    <div id="notifEmpty" class="empty-state" style="display:none">
      <div class="empty-icon">🔔</div>
      <h2>Aucune alerte</h2>
      <p>Active les notifications depuis la fiche d'un match à venir.</p>
    </div>
  </div>
</main>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-matches" onclick="showPage('matches')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
      <line x1="16" y1="2" x2="16" y2="6"></line>
      <line x1="8" y1="2" x2="8" y2="6"></line>
      <line x1="3" y1="10" x2="21" y2="10"></line>
    </svg>
    Programme
  </button>
  <button class="nav-item" id="nav-notifs" onclick="showPage('notifs')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>
    Alertes
  </button>
</nav>

<!-- Notification permission panel -->
<div class="notif-panel" id="notifPanel">
  <h3>🔔 Activer les notifications</h3>
  <p>Reçois une alerte 15 minutes avant le coup d'envoi de tes matchs favoris.</p>
  <div class="notif-panel-btns">
    <button class="btn-primary" id="notifAllow">Autoriser</button>
    <button class="btn-secondary" id="notifDismiss">Plus tard</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────
const state = {
  matches: [],
  filter: 'all',
  notifications: JSON.parse(localStorage.getItem('hbtv_notifs') || '[]'),
  notifPermission: Notification?.permission || 'default',
  lastUpdate: null,
  loading: true,
  timers: {}, // matchId → setTimeout id
};

// ─── UTILS ───────────────────────────────────────────────────────
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function formatDateLabel(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const now = new Date();
  const tomorrow = new Date(now); tomorrow.setDate(now.getDate() + 1);
  const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);

  const sameDay = (a, b) =>
    a.getDate() === b.getDate() &&
    a.getMonth() === b.getMonth() &&
    a.getFullYear() === b.getFullYear();

  const days = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
  const months = ['jan', 'fév', 'mar', 'avr', 'mai', 'juin', 'juil', 'août', 'sep', 'oct', 'nov', 'déc'];

  if (sameDay(d, now)) return "Aujourd'hui";
  if (sameDay(d, tomorrow)) return 'Demain';
  if (sameDay(d, yesterday)) return 'Hier';
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function formatTime(isoStr) {
  if (!isoStr) return '--:--';
  const d = new Date(isoStr);
  return `${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
}

function tvChipClass(ch) {
  const n = ch.name.toLowerCase();
  if (n.includes('bein')) return 'bein';
  if (n.includes('handball tv') || n.includes('htv')) return 'htv';
  if (n.includes('tf1') || n.includes('m6') || n.includes('france')) return 'free';
  return 'other';
}

// ─── NOTIFICATIONS ────────────────────────────────────────────────
function saveNotifs() {
  localStorage.setItem('hbtv_notifs', JSON.stringify(state.notifications));
}

function isNotifSet(matchId) {
  return state.notifications.some(n => n.id === matchId);
}

async function requestNotifPermission() {
  if (!('Notification' in window)) { showToast('❌ Notifications non supportées'); return false; }
  const perm = await Notification.requestPermission();
  state.notifPermission = perm;
  return perm === 'granted';
}

async function toggleNotif(match) {
  if (isNotifSet(match.id)) {
    // Remove
    const idx = state.notifications.findIndex(n => n.id === match.id);
    if (idx > -1) {
      clearTimeout(state.timers[match.id]);
      delete state.timers[match.id];
      state.notifications.splice(idx, 1);
      saveNotifs();
      showToast('🔕 Alerte supprimée');
      renderNotifPage();
      renderMatches();
      return;
    }
  }

  // Check permission
  if (state.notifPermission !== 'granted') {
    const granted = await requestNotifPermission();
    if (!granted) { showToast('❌ Permission refusée'); return; }
  }

  // Schedule notification 15 min before match
  if (match.datetime) {
    const matchMs = new Date(match.datetime).getTime();
    const alertMs = matchMs - 15 * 60 * 1000;
    const delay = alertMs - Date.now();

    if (delay > 0) {
      const timerId = setTimeout(() => {
        new Notification(`🤾 ${match.homeTeam} vs ${match.awayTeam}`, {
          body: `Coup d'envoi dans 15 min${match.tvChannel ? ` sur ${match.tvChannel.name}` : ''} !`,
          icon: match.homeLogo || '/favicon.ico',
          tag: `hbtv-${match.id}`,
        });
      }, delay);
      state.timers[match.id] = timerId;
    }
  }

  state.notifications.push({
    id: match.id,
    homeTeam: match.homeTeam,
    awayTeam: match.awayTeam,
    datetime: match.datetime,
    competition: match.competitionShort,
    tvChannel: match.tvChannel?.name || null,
  });
  saveNotifs();
  showToast('🔔 Alerte activée !');
  renderNotifPage();
  renderMatches();
}

// ─── RENDER MATCH CARD ────────────────────────────────────────────
function renderTeam(name, logo, side) {
  const abbr = name.substring(0, 3).toUpperCase();
  const logoHtml = logo
    ? `<img class="team-logo" src="${logo}" alt="${name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    : '';
  const placeholder = `<div class="team-logo-placeholder" style="${logo ? 'display:none' : ''}">${abbr}</div>`;

  return side === 'home'
    ? `<div class="team-home">${logoHtml}${placeholder}<span class="team-name">${name}</span></div>`
    : `<div class="team-away"><span class="team-name">${name}</span>${logoHtml}${placeholder}</div>`;
}

function renderCenter(match) {
  if (match.status === 'finished' && match.scoreHome !== null) {
    return `<div class="match-center">
      <div class="score-display">
        <span class="score-home">${match.scoreHome}</span>
        <span class="score-separator">–</span>
        <span class="score-away">${match.scoreAway}</span>
      </div>
    </div>`;
  }
  if (match.status === 'live' && match.scoreHome !== null) {
    return `<div class="match-center">
      <div class="score-display">
        <span class="score-home">${match.scoreHome}</span>
        <span class="score-separator">–</span>
        <span class="score-away">${match.scoreAway}</span>
      </div>
    </div>`;
  }
  const time = formatTime(match.datetime);
  const dateLabel = formatDateLabel(match.datetime);
  return `<div class="match-center">
    <div class="match-time">${time}</div>
    ${dateLabel ? `<div class="match-date-label">${dateLabel}</div>` : ''}
  </div>`;
}

function renderTVRow(match) {
  const notifSet = isNotifSet(match.id);
  let tvHtml = '';

  if (match.tvChannels && match.tvChannels.length > 0) {
    tvHtml = `<div class="tv-channels-group">
      ${match.tvChannels.map(ch => `
        <span class="tv-chip ${tvChipClass(ch)}">
          <span class="tv-icon">📺</span>${ch.short || ch.name}
        </span>`).join('')}
    </div>`;
  } else {
    tvHtml = `<span class="no-tv">Non diffusé</span>`;
  }

  const notifHtml = match.status === 'upcoming'
    ? `<button class="notif-btn ${notifSet ? 'active' : ''}" onclick="toggleNotif_${match.id}()" title="${notifSet ? 'Supprimer l\'alerte' : 'Alerte 15 min avant'}">
        🔔 ${notifSet ? 'Alerté' : 'Alerte'}
      </button>`
    : '';

  return `<div class="tv-channel">${tvHtml}${notifHtml}</div>`;
}

function renderCard(match) {
  const classes = [
    'match-card',
    match.status === 'live' ? 'is-live' : '',
    match.status === 'finished' ? 'is-finished' : '',
    match.isStarMatch ? 'is-star' : '',
  ].filter(Boolean).join(' ');

  const liveBadge = match.status === 'live'
    ? `<span class="live-badge">Direct</span>` : '';
  const starBadge = match.isStarMatch
    ? `<span class="star-badge">⭐ Star Match</span>` : '';

  const card = `<div class="${classes}" id="match-${match.id}">
    <div class="card-top">
      <span class="comp-badge">
        <span class="flag">${match.competitionFlag}</span>
        ${match.competitionShort}
        <span class="comp-round">${match.round}</span>
      </span>
      <div class="card-right-meta">
        ${starBadge}${liveBadge}
      </div>
    </div>

    ${renderTeam(match.homeTeam, match.homeLogo, 'home')}
    ${renderCenter(match)}
    ${renderTeam(match.awayTeam, match.awayLogo, 'away')}

    ${renderTVRow(match)}
  </div>`;

  // Register click handler after render via dataset
  return card;
}

// ─── RENDER MATCHES PAGE ──────────────────────────────────────────
function getFilteredMatches() {
  const { matches, filter } = state;
  if (filter === 'all') return matches;
  if (filter === 'tv') return matches.filter(m => m.tvOnly);
  if (filter === 'live') return matches.filter(m => m.status === 'live');
  return matches.filter(m => m.competition === filter);
}

function renderMatches() {
  const container = document.getElementById('matchesContainer');
  const filtered = getFilteredMatches();

  if (state.loading) {
    container.innerHTML = `<div class="loading-grid">
      ${[1,2,3,4].map(() => '<div class="skeleton"></div>').join('')}
    </div>`;
    return;
  }

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🤾</div>
      <h2>Aucun match</h2>
      <p>Aucun match ne correspond à ce filtre.</p>
    </div>`;
    return;
  }

  const live = filtered.filter(m => m.status === 'live');
  const upcoming = filtered.filter(m => m.status === 'upcoming');
  const finished = filtered.filter(m => m.status === 'finished');

  let html = '';

  if (live.length) {
    html += `<div class="section-header live-section">
      <span class="section-title">🔴 En direct (${live.length})</span>
      <div class="section-line"></div>
    </div>`;
    html += live.map(renderCard).join('');
  }

  if (upcoming.length) {
    html += `<div class="section-header upcoming-section">
      <span class="section-title">⏰ À venir (${upcoming.length})</span>
      <div class="section-line"></div>
    </div>`;
    html += upcoming.map(renderCard).join('');
  }

  if (finished.length) {
    html += `<div class="section-header">
      <span class="section-title">Terminés (${finished.length})</span>
      <div class="section-line"></div>
    </div>`;
    html += finished.map(renderCard).join('');
  }

  container.innerHTML = html;

  // Bind notif toggle functions dynamically
  state.matches.forEach(match => {
    window[`toggleNotif_${match.id}`] = () => toggleNotif(match);
  });

  renderStatusBar();
}

function renderStatusBar() {
  const all = state.matches;
  const liveCount = all.filter(m => m.status === 'live').length;
  const upcomingCount = all.filter(m => m.status === 'upcoming').length;
  const tvCount = all.filter(m => m.tvOnly).length;

  const counts = document.getElementById('statusCounts');
  counts.innerHTML = `
    ${liveCount > 0 ? `<span class="count-pill live-pill"><span class="dot"></span>${liveCount} en direct</span>` : ''}
    <span class="count-pill upcoming-pill"><span class="dot"></span>${upcomingCount} à venir</span>
    <span class="count-pill tv-pill"><span class="dot"></span>${tvCount} diffusés TV</span>
  `;

  if (state.lastUpdate) {
    const d = new Date(state.lastUpdate);
    document.getElementById('lastUpdate').textContent =
      `Mis à jour à ${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
  }
}

// ─── RENDER NOTIF PAGE ────────────────────────────────────────────
function renderNotifPage() {
  const list = document.getElementById('notifList');
  const empty = document.getElementById('notifEmpty');

  if (state.notifications.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  list.innerHTML = state.notifications.map(n => {
    const time = formatTime(n.datetime);
    const date = formatDateLabel(n.datetime);
    return `<div class="notif-item">
      <div class="notif-item-info">
        <div class="notif-item-match">${n.homeTeam} vs ${n.awayTeam}</div>
        <div class="notif-item-meta">
          ${n.competition} • ${date} ${time}
          ${n.tvChannel ? ` • 📺 ${n.tvChannel}` : ''}
        </div>
      </div>
      <button class="notif-remove" onclick="removeNotif(${n.id})" title="Supprimer">✕</button>
    </div>`;
  }).join('');
}

window.removeNotif = function(id) {
  const idx = state.notifications.findIndex(n => n.id === id);
  if (idx > -1) {
    clearTimeout(state.timers[id]);
    delete state.timers[id];
    state.notifications.splice(idx, 1);
    saveNotifs();
    showToast('🔕 Alerte supprimée');
    renderNotifPage();
    renderMatches();
  }
};

// ─── FETCH DATA ───────────────────────────────────────────────────
async function fetchMatches() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  try {
    const res = await fetch('/api/matches');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    state.matches = data.matches || [];
    state.lastUpdate = data.scrapedAt;
    state.loading = false;
    renderMatches();

    // If no matches returned, could be first load / demo
    if (state.matches.length === 0) {
      loadDemoData();
    }
  } catch (err) {
    console.error('Fetch error:', err);
    state.loading = false;
    // Load demo data in case of error (dev/demo mode)
    loadDemoData();
  } finally {
    btn.classList.remove('spinning');
  }
}

    },
    {
      id: 6, competition: 'ProLigue', competitionShort: 'ProLigue',
      competitionFlag: '🇫🇷', competitionLevel: 2, round: 'J29',
      datetime: add(5), homeTeam: 'Ivry', awayTeam: 'Saintes',
      homeLogo: 'https://www.lnh.fr/medias/sports_teams/ivry__logo__2023-2024.png',

// ─── FILTERS ─────────────────────────────────────────────────────
document.getElementById('filters').addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.filter = btn.dataset.filter;
  renderMatches();
});

// ─── REFRESH ─────────────────────────────────────────────────────
document.getElementById('refreshBtn').addEventListener('click', fetchMatches);

// ─── PAGES ───────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
  if (name === 'notifs') renderNotifPage();
}
window.showPage = showPage;

// ─── NOTIF PANEL ─────────────────────────────────────────────────
document.getElementById('notifAllow').addEventListener('click', async () => {
  const granted = await requestNotifPermission();
  document.getElementById('notifPanel').classList.remove('show');
  if (granted) showToast('✅ Notifications activées !');
  else showToast('❌ Permission refusée');
});
document.getElementById('notifDismiss').addEventListener('click', () => {
  document.getElementById('notifPanel').classList.remove('show');
});

// ─── AUTO REFRESH (every 3 min) ───────────────────────────────────
setInterval(fetchMatches, 3 * 60 * 1000);

// ─── INIT ─────────────────────────────────────────────────────────
fetchMatches();

// Ask for notif permission after 5s if not set
setTimeout(() => {
  if (Notification?.permission === 'default') {
    document.getElementById('notifPanel').classList.add('show');
  }
}, 5000);
</script>
